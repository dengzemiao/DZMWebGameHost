<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>游戏大厅</title>
  <link rel="stylesheet" href="css/lobby.css" />
</head>
<body>
  <!-- 粒子背景 -->
  <canvas id="particles-canvas"></canvas>

  <!-- ── 顶部导航栏 ── -->
  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <span class="logo-icon">🎮</span>
        <span class="logo-text">游戏大厅</span>
      </div>
    </div>
    <div class="topbar-center">
      <div class="status-pill" id="statusPill">
        <span class="status-dot" id="statusDot"></span>
        <span id="statusText">连接中...</span>
      </div>
    </div>
    <div class="topbar-right">
      <div class="online-info">
        <span class="online-icon">👥</span>
        <span>在线：<strong id="onlineCount">0</strong> 人</span>
      </div>
      <div class="player-info" id="playerInfo">
        <span class="player-avatar" id="playerAvatar">?</span>
        <span class="player-name" id="playerNameDisplay">连接中...</span>
        <button class="btn-edit-name" id="btnEditName" title="修改昵称">✏️</button>
      </div>
    </div>
  </header>

  <!-- ── 主体区域 ── -->
  <main class="main-layout">

    <!-- ── 左区：房间列表 ── -->
    <section class="room-section">
      <div class="section-header">
        <h2 class="section-title">
          <span class="section-icon">🏠</span>房间列表
          <span class="room-count-badge" id="roomCountBadge">0</span>
        </h2>
        <div class="room-actions">
          <div class="search-box">
            <span class="search-icon">🔍</span>
            <input type="text" id="roomSearch" placeholder="输入房间ID搜索..." class="search-input" />
          </div>
          <button class="btn-create" id="btnCreateRoom">
            <span>＋</span> 创建房间
          </button>
        </div>
      </div>

      <div class="room-list" id="roomList">
        <div class="empty-state" id="emptyRooms">
          <div class="empty-icon">🏜️</div>
          <p>暂无房间，快来创建第一个吧！</p>
        </div>
      </div>
    </section>

    <!-- ── 右区：公共聊天 ── -->
    <aside class="chat-section">
      <div class="section-header">
        <h2 class="section-title">
          <span class="section-icon">💬</span>公共聊天
        </h2>
      </div>
      <div class="chat-messages" id="chatBox"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="输入消息，Enter 发送..." class="chat-input" maxlength="200" />
        <button class="btn-send" id="sendBtn">发送</button>
      </div>
    </aside>
  </main>

  <!-- ── 创建房间弹窗 ── -->
  <div class="modal-overlay" id="createRoomModal">
    <div class="modal">
      <div class="modal-header">
        <h3>创建房间</h3>
        <button class="modal-close" id="btnCloseModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label>房间名称</label>
          <div class="input-with-action">
            <input type="text" id="roomNameInput" placeholder="房间名称" maxlength="20" />
            <button class="btn-random" id="btnRandomName" title="随机生成">🎲</button>
          </div>
        </div>
        <div class="form-row">
          <label>房间ID</label>
          <div class="room-id-display">
            <span id="newRoomId" class="room-id-text">------</span>
            <button class="btn-random" id="btnRandomId" title="重新生成">🔄</button>
          </div>
        </div>
        <div class="form-row">
          <label>选择游戏</label>
          <div class="game-select-grid" id="gameSelectGrid"></div>
        </div>
        <div class="form-row">
          <label>对战类型</label>
          <div class="radio-group" id="roomTypeGroup">
            <label class="radio-item active" data-value="pvp">
              <input type="radio" name="roomType" value="pvp" checked />
              <span class="radio-icon">⚔️</span>
              <span>玩家对战</span>
            </label>
            <label class="radio-item" data-value="pv_ai">
              <input type="radio" name="roomType" value="pv_ai" />
              <span class="radio-icon">🤖</span>
              <span>人机对战</span>
            </label>
          </div>
        </div>
        <div class="form-row" id="aiDifficultyRow" style="display:none">
          <label>AI 难度</label>
          <div class="radio-group" id="aiDifficultyGroup">
            <label class="radio-item" data-value="easy">
              <input type="radio" name="aiDifficulty" value="easy" />
              <span class="radio-icon">🌱</span>
              <span>简单</span>
            </label>
            <label class="radio-item active" data-value="normal">
              <input type="radio" name="aiDifficulty" value="normal" checked />
              <span class="radio-icon">⚡</span>
              <span>普通</span>
            </label>
            <label class="radio-item" data-value="hard">
              <input type="radio" name="aiDifficulty" value="hard" />
              <span class="radio-icon">🔥</span>
              <span>困难</span>
            </label>
          </div>
        </div>
        <!-- 文字找茬专属配置 -->
        <div class="form-row" id="wordSpotRow" style="display:none">
          <label>参战人数</label>
          <div class="ws-range-row">
            <input type="range" id="wsMaxPlayers" min="1" max="12" value="8" />
            <span id="wsMaxPlayersVal">8 人</span>
          </div>
        </div>
        <div class="form-row" id="wordSpotLevelRow" style="display:none">
          <label>总关数</label>
          <div class="ws-range-row">
            <input type="range" id="wsTotalLevels" min="1" max="30" value="10" />
            <span id="wsTotalLevelsVal">10 关</span>
          </div>
        </div>
        <div class="form-row" id="wordSpotTimeRow" style="display:none">
          <label>每关时限</label>
          <div class="ws-range-row">
            <input type="range" id="wsTimePer" min="10" max="120" step="5" value="30" />
            <span id="wsTimePerVal">30 秒</span>
          </div>
        </div>
        <div class="form-row">
          <label>允许观战</label>
          <label class="toggle-switch">
            <input type="checkbox" id="allowSpectate" checked />
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btnCancelCreate">取消</button>
        <button class="btn-confirm" id="btnConfirmCreate">创建房间</button>
      </div>
    </div>
  </div>

  <!-- ── 修改昵称弹窗 ── -->
  <div class="modal-overlay" id="editNameModal">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h3>修改昵称</h3>
        <button class="modal-close" id="btnCloseNameModal">✕</button>
      </div>
      <div class="modal-body">
        <div class="form-row">
          <label>新昵称</label>
          <input type="text" id="newNameInput" placeholder="输入新昵称" maxlength="16" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btnCancelName">取消</button>
        <button class="btn-confirm" id="btnConfirmName">确认</button>
      </div>
    </div>
  </div>

  <script src="js/game-registry.js?v=2"></script>
  <script src="js/ws-client.js"></script>
  <script src="js/lobby.js"></script>
  
  <!-- 粒子效果脚本 -->
  <script>
  (function() {
    const canvas = document.getElementById('particles-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let particles = [];
    let animationId;
    
    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    
    class Particle {
      constructor() {
        this.reset();
      }
      
      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2 + 0.5;
        this.speedX = (Math.random() - 0.5) * 0.5;
        this.speedY = (Math.random() - 0.5) * 0.5;
        this.opacity = Math.random() * 0.5 + 0.1;
        this.color = Math.random() > 0.7 ? '#f0a500' : (Math.random() > 0.5 ? '#58a6ff' : '#a855f7');
      }
      
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        
        if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
          this.reset();
        }
      }
      
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.globalAlpha = this.opacity;
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }
    
    function init() {
      particles = [];
      const particleCount = Math.min(80, Math.floor((canvas.width * canvas.height) / 15000));
      for (let i = 0; i < particleCount; i++) {
        particles.push(new Particle());
      }
    }
    
    function connectParticles() {
      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const dx = particles[i].x - particles[j].x;
          const dy = particles[i].y - particles[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          
          if (dist < 120) {
            ctx.beginPath();
            ctx.strokeStyle = '#f0a500';
            ctx.globalAlpha = 0.05 * (1 - dist / 120);
            ctx.lineWidth = 0.5;
            ctx.moveTo(particles[i].x, particles[i].y);
            ctx.lineTo(particles[j].x, particles[j].y);
            ctx.stroke();
            ctx.globalAlpha = 1;
          }
        }
      }
    }
    
    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      
      connectParticles();
      animationId = requestAnimationFrame(animate);
    }
    
    window.addEventListener('resize', () => {
      resize();
      init();
    });
    
    resize();
    init();
    animate();
  })();
  </script>
</body>
</html>
